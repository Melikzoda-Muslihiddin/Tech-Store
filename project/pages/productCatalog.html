<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Catalog - Laptops</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body class="bg-slate-50 text-slate-900">
    <header class="bg-white border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-5 py-4 flex items-center justify-between gap-6">
            <a href="./index.html" class="flex items-center gap-2 font-bold">
                <span class="inline-flex w-9 h-9 rounded-xl bg-blue-600"><img src="./image.png" alt=""></span>
                TechStore
            </a>

            <nav class="hidden md:flex items-center gap-6 text-sm text-slate-600">
                <a href="./productCatalog.html" class="text-slate-900 font-semibold">Laptops</a>
                <a href="#" class="hover:text-slate-900">Accessories</a>
                <a href="#" class="hover:text-slate-900">Deals</a>
            </nav>

            <div class="flex items-center gap-3">
                <input id="search"
                    class="hidden md:block w-72 rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Search premium tech..." />

                <a href="./cart.html"
                    class="relative inline-flex items-center justify-center w-10 h-10 rounded-xl border border-slate-200 bg-white">
                    🛒
                    <span id="cartCount"
                        class="hidden absolute -top-2 -right-2 text-xs bg-blue-600 text-white rounded-full px-2 py-0.5">0</span>
                </a>

                <button id="profileBtn" title="Profile"
                    class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-slate-200"></button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-5 py-8">
        <p class="text-xs text-slate-500">Home / Laptops</p>
        <h1 class="mt-2 text-3xl font-bold">Premium Laptops</h1>
        <p class="mt-2 text-slate-500 text-sm max-w-2xl">
            High-performance machines engineered for elite creators, developers, and visionaries.
        </p>

        <div class="mt-8 grid grid-cols-12 gap-6">
            <aside class="col-span-12 md:col-span-3">
                <div class="rounded-2xl bg-white border border-slate-100 p-5">
                    <p class="text-xs font-semibold text-slate-500">FILTERS</p>

                    <div class="mt-5">
                        <p class="text-sm font-semibold">Category</p>
                        <select id="category"
                            class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">All</option>
                            <option value="gaming">Gaming</option>
                            <option value="business">Business</option>
                            <option value="student">Student</option>
                            <option value="ultrabooks">Ultrabooks</option>
                        </select>
                    </div>

                    <div class="mt-4">
                        <p class="text-sm font-semibold">Sort</p>
                        <select id="sort"
                            class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="popularity">Popularity</option>
                            <option value="price_asc">Price: Low to High</option>
                            <option value="price_desc">Price: High to Low</option>
                        </select>
                    </div>

                    <button id="apply"
                        class="mt-5 w-full rounded-xl bg-blue-600 py-2 text-white text-sm font-semibold hover:bg-blue-700">
                        Apply Filters
                    </button>
                </div>
            </aside>

            <section class="col-span-12 md:col-span-9">
                <div class="flex items-center justify-between text-sm text-slate-500">
                    <span id="results">Showing 0-0 of 0 results</span>
                </div>

                <div id="grid" class="mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                <div id="pagination" class="mt-6 flex items-center justify-center gap-2"></div>
            </section>
        </div>
    </main>

    <script type="module" src="../dist/catalog.js"></script>
</body>

</html>
