<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body class="bg-slate-50 text-slate-900">
    <div class="min-h-screen grid grid-cols-12">
        <section class="hidden md:block col-span-6 bg-slate-900 relative">
            <img class="absolute inset-0 w-full h-full object-cover opacity-60"
                src="https://images.pexels.com/photos/7988086/pexels-photo-7988086.jpeg?auto=compress&cs=tinysrgb&w=1200"
                alt="bg">
            <div class="relative p-10 text-white">
                <h1 class="text-4xl font-bold mt-40">Register</h1>
                <p class="mt-3 text-white/70 max-w-md text-sm">
                    Experience the ultimate synergy of power and portability with the new TechNova Pro series.
                </p>
            </div>
        </section>

        <section class="col-span-12 md:col-span-6 bg-white">
            <div class="max-w-md mx-auto px-6 py-10">
                <div class="flex items-center justify-between">
                    <a href="./index.html" class="flex items-center gap-2 font-bold">
                        <span class="inline-flex w-9 h-9 rounded-xl bg-blue-600"><img src="./image.png" alt=""></span>
                        TechStore
                    </a>
                    <a href="./cart.html"
                        class="relative w-10 h-10 rounded-xl border border-slate-200 flex items-center justify-center">🛒
                        <span id="cartCount"
                            class="hidden absolute -top-2 -right-2 text-xs bg-blue-600 text-white rounded-full px-2 py-0.5">0</span>
                    </a>
                </div>

                <h2 class="mt-10 text-2xl font-bold">Create Account</h2>
                <p class="mt-2 text-sm text-slate-500">Enter your details to get started.</p>

                <div class="mt-8 grid gap-4">
                    <div>
                        <label class="text-xs text-slate-500">Name</label>
                        <input id="name"
                            class="mt-2 w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="Name...">
                    </div>

                    <div>
                        <label class="text-xs text-slate-500">Email Address</label>
                        <input id="email"
                            class="mt-2 w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="alex@example.com">
                    </div>

                    <div>
                        <label class="text-xs text-slate-500">Password</label>
                        <input id="password" type="password"
                            class="mt-2 w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="••••••••">
                    </div>

                    <p id="error" class="text-sm text-red-600"></p>

                    <button id="registerBtn"
                        class="mt-2 w-full rounded-xl bg-blue-600 text-white py-3 text-sm font-semibold hover:bg-blue-700">
                        Sign Up
                    </button>

                    <p class="text-sm text-slate-500 text-center">
                        Already have an account?
                        <a href="./login.html" class="text-blue-600 font-semibold">Sign In</a>
                    </p>
                </div>
            </div>
        </section>
    </div>

    <script type="module" src="../dist/register.js"></script>
</body>

</html>
