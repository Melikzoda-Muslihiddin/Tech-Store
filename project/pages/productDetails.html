<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body class="bg-slate-50 text-slate-900">
    <header class="bg-white border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-5 py-4 flex items-center justify-between gap-6">
            <a href="./index.html" class="flex items-center gap-2 font-bold">
                <span class="inline-flex w-9 h-9 rounded-xl bg-blue-600"><img src="./image.png" alt=""></span>
                TechStore
            </a>

            <div class="flex items-center gap-3">
                <a href="./productCatalog.html" class="text-sm text-slate-600 hover:text-slate-900">Back to Catalog</a>
                <a href="./cart.html"
                    class="relative inline-flex items-center justify-center w-10 h-10 rounded-xl border border-slate-200 bg-white">
                    🛒
                    <span id="cartCount"
                        class="hidden absolute -top-2 -right-2 text-xs bg-blue-600 text-white rounded-full px-2 py-0.5">0</span>
                </a>
                <button id="profileBtn" title="Profile"
                    class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-slate-200"></button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-5 py-8">
        <p class="text-xs text-slate-500">Home / Laptops / <span id="titleCrumb">Product</span></p>

        <div class="mt-6 grid grid-cols-12 gap-6">
            <section class="col-span-12 md:col-span-7">
                <div class="rounded-2xl bg-white border border-slate-100 p-5">
                    <div class="rounded-2xl overflow-hidden bg-slate-50">
                        <img id="mainImg" class="w-full h-[360px] object-cover" src="" alt="Product" />
                    </div>
                    <div id="thumbs" class="mt-4 flex gap-3"></div>
                </div>
            </section>

            <aside class="col-span-12 md:col-span-5">
                <div class="rounded-2xl bg-white border border-slate-100 p-6">
                    <span
                        class="inline-flex text-[10px] px-2 py-1 rounded-lg bg-blue-50 text-blue-700 font-semibold">LIMITED
                        EDITION</span>
                    <h1 id="title" class="mt-3 text-2xl font-bold">Product Title</h1>
                    <div id="price" class="mt-3 text-3xl font-extrabold">$0.00</div>
                    <p id="desc" class="mt-4 text-sm text-slate-600">Description...</p>

                    <div class="mt-5">
                        <p class="text-xs font-semibold text-slate-500">COLORS</p>
                        <div id="colors" class="mt-2 flex items-center gap-2"></div>
                    </div>

                    <div class="mt-6 grid gap-3">
                        <button id="addBtn"
                            class="w-full rounded-xl bg-blue-600 text-white py-3 text-sm font-semibold hover:bg-blue-700">
                            Add to Cart
                        </button>
                        <button id="buyBtn"
                            class="w-full rounded-xl bg-slate-900 text-white py-3 text-sm font-semibold hover:bg-slate-950">
                            Buy Now
                        </button>
                    </div>

                    <div class="mt-6 grid grid-cols-2 gap-4 text-xs text-slate-600">
                        <div class="flex items-center gap-2">✅ Free Express Delivery</div>
                        <div class="flex items-center gap-2">✅ 2 Year Warranty</div>
                    </div>
                </div>
            </aside>
        </div>

        <div class="mt-10 flex items-center justify-between">
            <h2 class="text-lg font-bold">Similar Products</h2>
        </div>

        <div id="similar" class="mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <script type="module" src="../dist/details.js"></script>
</body>

</html>
